<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse Performance Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      background: #f9fafb;
      color: #111827;
      font-size: 14px;
    }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .audit-btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
    }
    .audit-btn:hover { background: #1d4ed8; }
    .audit-btn:disabled { opacity: 0.6; cursor: default; }
    .status { color: #6b7280; font-size: 12px; margin-bottom: 12px; }
    .list { max-height: 240px; overflow-y: auto; }
    .item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #e5e7eb;
    }
    .item:last-child { border: none; }
    .item-url {
      flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-size: 12px; color: #374151;
    }
    .item-time { font-size: 11px; color: #9ca3af; white-space: nowrap; }
    .item-error { color: #dc2626; font-size: 11px; }
    .item-ok { color: #16a34a; font-size: 11px; }
    .footer { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    .footer a {
      color: #2563eb; text-decoration: none; font-size: 12px; font-weight: 500;
    }
    .footer a:hover { text-decoration: underline; }
    .empty { color: #9ca3af; font-size: 12px; text-align: center; padding: 16px 0; }
    .server-section { margin-bottom: 12px; }
    .server-label {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    .server-row { display: flex; gap: 6px; }
    .server-input {
      flex: 1;
      padding: 6px 8px;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 12px;
    }
    .server-save {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #2563eb;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .server-saved { color: #16a34a; font-size: 11px; margin-top: 4px; display: none; }
  </style>
</head>
<body>
  <h1>🔍 Lighthouse Performance Tracker</h1>

  <button class="audit-btn" id="auditBtn">Audit Current Page</button>
  <div class="status" id="statusText"></div>

  <div class="server-section">
    <div class="server-label">Dashboard server URL</div>
    <div class="server-row">
      <input type="text" class="server-input" id="serverInput" placeholder="http://49.249.95.65:3030" />
      <button class="server-save" id="serverSave">Save</button>
    </div>
    <p style="font-size:11px;color:#6b7280;margin-top:6px;">
      Where this install sends audit requests. Leave blank to use the
      production dashboard; only fill this in for local development.
    </p>
    <div class="server-saved" id="serverSaved">Saved</div>
  </div>

  <div id="lastError" style="font-size:12px;color:#b91c1c;margin-bottom:12px;display:none;padding:8px;background:#fff1f2;border:1px solid #fecaca;border-radius:6px;"></div>

  <div class="list" id="list">
    <div class="empty">No audits yet</div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000" target="_blank" id="dashboardLink">Open Dashboard &rarr;</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
