<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse Performance Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      background: #f9fafb;
      color: #111827;
      font-size: 14px;
    }
    h1 { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .switch {
      position: relative; width: 44px; height: 24px; cursor: pointer;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; background: #d1d5db; border-radius: 24px;
      transition: 0.2s;
    }
    .slider::before {
      content: ''; position: absolute; left: 3px; bottom: 3px;
      width: 18px; height: 18px; background: white; border-radius: 50%;
      transition: 0.2s;
    }
    .switch input:checked + .slider { background: #2563eb; }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .status { color: #6b7280; font-size: 12px; margin-bottom: 8px; }
    .list { max-height: 240px; overflow-y: auto; }
    .item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0; border-bottom: 1px solid #e5e7eb;
    }
    .item:last-child { border: none; }
    .item-url {
      flex: 1; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; font-size: 12px; color: #374151;
    }
    .item-time { font-size: 11px; color: #9ca3af; white-space: nowrap; }
    .item-error { color: #dc2626; font-size: 11px; }
    .item-ok { color: #16a34a; font-size: 11px; }
    .footer { margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    .footer a {
      color: #2563eb; text-decoration: none; font-size: 12px; font-weight: 500;
    }
    .footer a:hover { text-decoration: underline; }
    .empty { color: #9ca3af; font-size: 12px; text-align: center; padding: 16px 0; }
  </style>
</head>
<body>
  <h1>🔍 Lighthouse Performance Tracker</h1>

  <div class="toggle-row">
    <span>Auto-audit on page visit</span>
    <label class="switch">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="status" id="statusText">Waiting for page visits...</div>

  <p style="font-size:12px;color:#6b7280;margin-bottom:8px;">
    Browse any page on myvi.in and the extension will audit it automatically. Other sites are ignored.
  </p>

  <div id="lastError" style="font-size:12px;color:#b91c1c;margin-bottom:12px;display:none;padding:8px;background:#fff1f2;border:1px solid #fecaca;border-radius:6px;"></div>

  <div class="list" id="list">
    <div class="empty">No audits yet</div>
  </div>

  <div class="footer">
    <a href="http://localhost:3000" target="_blank">Open Dashboard &rarr;</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
